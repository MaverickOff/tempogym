<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="30" fill="#0d0d12" stroke="#00e676" stroke-width="3"/>

  <!-- Marcas del reloj -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="56" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="12" y2="32" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="56" y2="32" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>

  <!-- Aguja de las horas -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Aguja de los minutos -->
  <line x1="32" y1="32" x2="42" y2="32" stroke="#00e676" stroke-width="2" stroke-linecap="round"/>

  <!-- Centro del reloj -->
  <circle cx="32" cy="32" r="3" fill="#00e676"/>
</svg>