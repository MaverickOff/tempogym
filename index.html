<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>TempoGym</title>
</head>
<body class="bg-dark text-light"> <nav class="navbar navbar-dark bg-black shadow-sm">
        <span class="navbar-brand mb-0 h1 mx-auto font-weight-bold text-uppercase" style="letter-spacing: 2px;">TempoGym</span>
    </nav>

    <div class="container flex-grow-1 d-flex flex-column justify-content-between p-3" style="min-height: calc(100dvh - 60px);">
        
        <div id="panel-config" class="row no-gutters mt-2">
            <div class="col-4 p-1">
                <div class="config-card">
                    <label for="fase_prep">Prep (s)</label>
                    <input type="number" id="fase_prep" value="5">
                </div>
            </div>
            <div class="col-4 p-1">
                <div class="config-card">
                    <label for="fase_bajada">Bajada</label>
                    <input type="number" id="fase_bajada" value="3">
                </div>
            </div>
            <div class="col-4 p-1">
                <div class="config-card">
                    <label for="fase_fondo">Fondo</label>
                    <input type="number" id="fase_fondo" value="1">
                </div>
            </div>
            <div class="col-6 p-1">
                <div class="config-card highlight-card">
                    <label for="fase_subida">Subida</label>
                    <input type="number" id="fase_subida" value="2">
                </div>
            </div>
            <div class="col-6 p-1">
                <div class="config-card highlight-card">
                    <label for="fase_contraccion">Contraer</label>
                    <input type="number" id="fase_contraccion" value="1">
                </div>
            </div>
            <div class="col-12 p-1 mt-2">
                <div class="config-card reps-card border-primary">
                    <label for="reps" class="text-primary font-weight-bold">Repeticiones</label>
                    <input type="number" id="reps" value="6" class="text-primary">
                </div>
            </div>
        </div>

        <div class="timer-display flex-grow-1 d-flex flex-column justify-content-center align-items-center text-center my-4">
            <div id="texto">
                <span class="text-muted" style="font-size: 1.2rem;">Configura tu serie</span>
            </div>
        </div>

        <div class="action-buttons mb-2">
            <input type="button" value="Empezar" id="btnEmpezar" class="btn btn-primary btn-lg btn-block py-3 text-uppercase font-weight-bold shadow-lg">
            <input type="button" value="Pausar" id="btnPausar" class="btn btn-warning btn-lg btn-block py-3 text-uppercase font-weight-bold shadow-lg mt-3" disabled>
        </div>
        
    </div>

    <script src="js/script.js"></script>
</body>
</html>
