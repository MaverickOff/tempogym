<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline';"
    />
    <meta name="description" content="Temporizador de entrenamiento con control de tempo para ejercicios de gimnasio" />
    <meta name="theme-color" content="#0d0d12" />

    <title>TempoGym - Temporizador de Entrenamiento</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-light">
    <!-- Header / Navegación -->
    <header>
      <nav class="navbar navbar-dark bg-black shadow-sm">
        <span
          class="navbar-brand mb-0 h1 mx-auto font-weight-bold text-uppercase"
          style="letter-spacing: 2px"
          >TempoGym</span
        >
      </nav>
    </header>

    <!-- Contenido Principal -->
    <main
      class="container d-flex flex-column p-3 flex-grow-1"
      style="min-height: calc(100dvh - 60px); gap: 0; padding-bottom: 0;"
    >
      <!-- Navbar SPA -->
      <nav
        class="spa-navbar"
        role="tablist"
        aria-label="Navegación principal"
      >
        <button
          id="nav-temporizador"
          class="spa-nav-btn active"
          role="tab"
          aria-selected="true"
          aria-controls="vista-temporizador"
          tabindex="-1"
        >
          ⏱️ Temporizador
        </button>
        <button
          id="nav-calculadora"
          class="spa-nav-btn"
          role="tab"
          aria-selected="false"
          aria-controls="vista-calculadora"
          tabindex="0"
        >
          📊 Calculadora Volumen
        </button>
      </nav>

      <!-- Vista del Temporizador -->
      <div
        id="vista-temporizador"
        class="vista-container"
        role="tabpanel"
        aria-labelledby="nav-temporizador"
      >
      <!-- Panel de Configuración -->
      <section id="panel-config" class="row no-gutters" aria-label="Configuración del ejercicio">
        <div class="col-12 p-1 mb-2">
          <select
            id="preset-selector"
            class="form-control bg-black text-light shadow-sm"
            style="border: 0px; border-radius: 12px; font-size: 0.9rem;"
            aria-label="Seleccionar rutina predefinida"
          >
            <option value="" selected disabled>⚡ Seleccionar ejercicio de la rutina</option>
                    
                    <optgroup label="1. Upper Body 1 (Pecho, Espalda, Brazos)">
                        <option value="ub1_db_bench">Dumbbell Bench Press (6 reps | 3-1-X-1)</option>
                        <option value="ub1_inc_bench">Incline Bench Press (8 reps | 3-1-X-1)</option>
                        <option value="ub1_pullup">Pull-up (7 reps | 2-1-X-1)</option>
                        <option value="ub1_row">Straight Back Seated Row (12 reps | 2-0-1-2)</option>
                        <option value="ub1_curl">Barbell Curl (12 reps | 3-0-1-1)</option>
                        <option value="ub1_triceps">Triceps Pushdown (12 reps | 3-0-1-1)</option>
                    </optgroup>

                    <optgroup label="2. Lower Body 1 (Pierna)">
                        <option value="lb1_squat">Full Squat (5 reps | 3-1-X-1)</option>
                        <option value="lb1_rdl">Romanian Deadlift (6 reps | 4-0-X-1)</option>
                        <option value="lb1_legpress">Sled 45° Leg Wide Press (10 reps | 3-1-2-1)</option>
                        <option value="lb1_legext">Lever Leg Extension (12 reps | 2-0-1-2)</option>
                        <option value="lb1_calf">Lever Standing Calf Raise (12 reps | 2-2-1-1)</option>
                    </optgroup>

                    <optgroup label="3. Upper Body 2">
                        <option value="ub2_shoulder">Seated Shoulder Press (8 reps | 3-1-X-1)</option>
                        <option value="ub2_chinup">Chin-Up (8 reps | 2-1-X-1)</option>
                        <option value="ub2_row">Straight Back Seated Row (8 reps | 2-0-1-2)</option>
                        <option value="ub2_curl">Dumbbell Incline Curl (10 reps | 4-0-1-1)</option>
                        <option value="ub2_lateral">Lateral Raise (12 reps | 2-0-1-2)</option>
                        <option value="ub2_triceps">Lying Single Extension (12 reps | 3-1-1-0)</option>
                    </optgroup>

                    <optgroup label="4. Lower Body 2 (Pierna Pesada)">
                        <option value="lb2_deadlift">Deadlift (6 reps | 2-1-X-1)</option>
                        <option value="lb2_bulgarian">Bulgarian Split Squat (8 reps | 3-1-1-0)</option>
                        <option value="lb2_legpress">Sled 45° Leg Wide Press (10 reps | 3-1-2-1)</option>
                        <option value="lb2_legcurl">Lever Lying Leg Curl (12 reps | 2-0-1-2)</option>
                        <option value="lb2_calf">Lever Standing Calf Raise (10 reps | 2-2-1-1)</option>
                  </optgroup>
                </select>
              </div>

        <!-- Inputs de configuración -->
        <div class="col-6 p-1">
          <div class="config-card">
            <label for="fase_prep">Prep (s)</label>
            <input
              type="number"
              id="fase_prep"
              value="5"
              min="0"
              max="60"
              aria-label="Tiempo de preparación en segundos"
            />
          </div>
        </div>
        <div class="col-6 p-1">
          <div class="config-card reps-card">
            <label for="reps" class="text-primary font-weight-bold"
              >Repeticiones</label
            >
            <input
              type="number"
              id="reps"
              value="6"
              class="text-primary"
              min="1"
              max="100"
              aria-label="Número de repeticiones"
            />
          </div>
        </div>

        <div class="col-3 p-1">
          <div class="config-card tempo-card">
            <label for="fase_bajada">Baja</label>
            <input
              type="number"
              id="fase_bajada"
              value="3"
              min="0"
              max="60"
              aria-label="Tiempo de fase de bajada"
            />
          </div>
        </div>
        <div class="col-3 p-1">
          <div class="config-card tempo-card">
            <label for="fase_fondo">Fondo</label>
            <input
              type="number"
              id="fase_fondo"
              value="1"
              min="0"
              max="60"
              aria-label="Tiempo de fase en fondo"
            />
          </div>
        </div>
        <div class="col-3 p-1">
          <div class="config-card tempo-card">
            <label for="fase_subida">Sube</label>
            <input
              type="number"
              id="fase_subida"
              value="2"
              min="0"
              max="60"
              aria-label="Tiempo de fase de subida"
            />
          </div>
        </div>
        <div class="col-3 p-1">
          <div class="config-card tempo-card">
            <label for="fase_contraccion">Contrae</label>
            <input
              type="number"
              id="fase_contraccion"
              value="1"
              min="0"
              max="60"
              aria-label="Tiempo de fase de contracción"
            />
          </div>
        </div>
      </section>

      <!-- Display del Temporizador -->
      <section
        class="timer-display d-flex flex-column justify-content-center align-items-center text-center"
        aria-live="polite"
        aria-atomic="true"
      >
        <div id="texto">
          <h5
            id="display-reps"
            class="text-primary mb-2"
            style="display: none"
            aria-hidden="true"
          ></h5>
          <h3
            id="display-fase"
            style="display: none"
            aria-hidden="true"
          ></h3>
          <h1
            id="display-tiempo"
            style="font-size: 4rem; display: none"
            aria-hidden="true"
          ></h1>
          <span
            id="display-mensaje"
            class="text-muted"
            style="font-size: 1.2rem"
            >Configura tu serie</span
          >
        </div>
      </section>

      <!-- Botones de Acción -->
      <section class="action-buttons mb-2" aria-label="Controles del temporizador">
        <input
          type="button"
          value="Empezar"
          id="btnEmpezar"
          class="btn btn-primary btn-lg btn-block py-3 text-uppercase font-weight-bold shadow-lg"
          aria-label="Comenzar temporizador"
        />
        <input
          type="button"
          value="Pausar"
          id="btnPausar"
          class="btn btn-warning btn-lg btn-block py-3 text-uppercase font-weight-bold shadow-lg mt-3"
          disabled
          aria-label="Pausar o reanudar temporizador"
        />
      </section>
      </div>

      <!-- Vista de la Calculadora de Volumen -->
      <div
        id="vista-calculadora"
        class="vista-container"
        role="tabpanel"
        aria-labelledby="nav-calculadora"
        hidden
        aria-hidden="true"
      >
        <!-- Display del Volumen Total -->
        <section class="volumen-display" aria-live="polite" aria-atomic="true">
          <h2>Volumen Total</h2>
          <div class="volumen-valor" id="volumen-total">0 kg</div>
        </section>

        <!-- Contenedor de Sets -->
        <section
          id="sets-container"
          class="sets-container"
          aria-label="Lista de sets"
          role="list"
        ></section>

        <!-- Botones de Acción -->
        <section class="calculator-actions" aria-label="Controles de la calculadora">
          <button
            id="btn-anadir-set"
            class="btn btn-anadir"
            aria-label="Añadir nuevo set"
          >
            ➕ Añadir Set
          </button>
          <button
            id="btn-eliminar-set"
            class="btn btn-eliminar"
            aria-label="Eliminar último set"
            disabled
          >
            🗑️ Eliminar Último
          </button>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-left">
      <small class="version-tag">v1.6.0</small>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
